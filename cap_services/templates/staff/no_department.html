{% extends 'staff/base.html' %}
{% load static %}

{% block title %}No Department Assigned - Staff Panel{% endblock %}

{% block content %}
<div class="empty-state">
    <i class="fas fa-building"></i>
    <h2>No Department Assigned</h2>
    <p>
        You have not been assigned to any department yet.<br>
        Please contact your administrator to get department access.
    </p>
    <a href="{% url 'accounts:logout' %}" class="btn-custom btn-custom-primary">
        <i class="fas fa-sign-out-alt"></i> Logout
    </a>
</div>

<style>
.empty-state {
    text-align: center;
    padding: 80px 20px;
    max-width: 500px;
    margin: 0 auto;
}
.empty-state i {
    font-size: 80px;
    color: #cbd5e1;
    margin-bottom: 24px;
    display: block;
}
.empty-state h2 {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 10px;
    color: #1f1f1f;
}
.empty-state p {
    color: #64748b;
    margin-top: 10px;
    margin-bottom: 30px;
    line-height: 1.5;
}

.btn-custom {
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
    cursor: pointer;
    border: none;
}
.btn-custom-primary {
    background: #2A6FB0;
    color: white;
}
.btn-custom-primary:hover {
    background: #1e4a76;
    transform: translateY(-2px);
}

/* Responsive */
@media (max-width: 768px) {
    .empty-state {
        padding: 60px 16px;
    }
    
    .empty-state i {
        font-size: 60px;
        margin-bottom: 20px;
    }
    
    .empty-state h2 {
        font-size: 20px;
    }
    
    .empty-state p {
        font-size: 14px;
        margin-bottom: 24px;
    }
    
    .btn-custom {
        padding: 8px 20px;
        font-size: 13px;
    }
}

@media (max-width: 480px) {
    .empty-state {
        padding: 40px 16px;
    }
    
    .empty-state i {
        font-size: 50px;
        margin-bottom: 16px;
    }
    
    .empty-state h2 {
        font-size: 18px;
    }
    
    .empty-state p {
        font-size: 13px;
        margin-bottom: 20px;
    }
    
    .btn-custom {
        padding: 8px 16px;
        font-size: 13px;
        width: 100%;
        justify-content: center;
    }
}
</style>
{% endblock %}
