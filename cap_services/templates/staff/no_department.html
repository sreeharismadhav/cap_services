{% extends 'staff/base.html' %}
{% load static %}

{% block title %}No Department Assigned - Staff Panel{% endblock %}

{% block content %}
<div class="empty-state" style="text-align: center; padding: 80px 20px;">
    <i class="fas fa-building" style="font-size: 80px; color: #cbd5e1; margin-bottom: 24px; display: block;"></i>
    <h2>No Department Assigned</h2>
    <p style="color: #64748b; margin-top: 10px; margin-bottom: 30px;">
        You have not been assigned to any department yet.<br>
        Please contact your administrator to get department access.
    </p>
    <a href="{% url 'accounts:logout' %}" class="btn-custom btn-custom-primary">
        <i class="fas fa-sign-out-alt"></i> Logout
    </a>
</div>

<style>
.empty-state {
    max-width: 500px;
    margin: 0 auto;
}
.empty-state h2 {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 10px;
}
</style>
{% endblock %}
